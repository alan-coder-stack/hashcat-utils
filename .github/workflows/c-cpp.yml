name: Build Windows Binaries

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  build-windows:
    name: Build for Windows (x64 & x86)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW-w64 (for cross-compilation)
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build Windows 64-bit binaries
        run: |
          cd src
          make clean
          make windows

      - name: Verify 64-bit binaries
        run: |
          cd src
          echo "Generated 64-bit executables:"
          ls -lh *.exe || echo "No .exe files found in src/"
          # 测试其中一个工具
          if [ -f cap2hccapx.exe ]; then
            echo "Testing cap2hccapx.exe:"
            ./cap2hccapx.exe --help 2>&1 | head -5 || true
          fi

      - name: Upload 64-bit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hashcat-utils-windows-x64
          path: src/*.exe
          retention-days: 7

      - name: Build Windows 32-bit binaries (optional)
        run: |
          cd src
          make clean
          # 对于32位编译，可能需要设置不同的编译器前缀
          # 根据官方文档，make windows 可能同时生成32/64位，或需要额外参数
          # 如果 make windows 只生成64位，可尝试：
          # make CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ AR=i686-w64-mingw32-ar
          make windows  # 先按默认方式编译，如果只生成64位，下面步骤会跳过

      - name: Upload 32-bit artifacts (if generated)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hashcat-utils-windows-x86
          path: src/*.exe
          retention-days: 7
