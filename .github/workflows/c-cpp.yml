name: Build hashcat-utils for Windows

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Binaries (x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW-w64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build hashcat-utils for Windows
        run: |
          cd src
          # 清理之前的构建
          make clean
          # 使用官方 Makefile 提供的 win64 目标进行交叉编译
          # 这会自动使用 x86_64-w64-mingw32-gcc
          make win64

      - name: Verify binaries
        run: |
          cd src
          ls -lh *.exe
          # 简单验证其中一个二进制文件是否有效 (例如 cap2hccapx)
          if [ -f cap2hccapx.exe ]; then
            echo "cap2hccapx.exe generated successfully."
            file cap2hccapx.exe
          else
            echo "Error: cap2hccapx.exe not found!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hashcat-utils-windows-x64
          path: src/*.exe
          retention-days: 5

